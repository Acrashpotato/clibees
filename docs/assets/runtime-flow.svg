<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">clibees runtime flow</title>
  <desc id="desc">Sequence style flow showing user request, coordinator orchestration, approval, execution, validation, and persistence.</desc>
  <defs>
    <style>
      .bg { fill: #f8f4ed; }
      .head { fill: #dde8d5; stroke: #26412d; stroke-width: 2.5; rx: 18; }
      .text { font: 700 22px "Segoe UI", Arial, sans-serif; fill: #142014; }
      .small { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #2a352a; }
      .lifeline { stroke: #7f8c7f; stroke-width: 2; stroke-dasharray: 8 8; }
      .arrow { stroke: #304330; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .note { fill: #fffdf8; stroke: #6f785f; stroke-width: 2; rx: 14; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#304330"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760"/>

  <g>
    <rect class="head" x="50" y="55" width="130" height="50"/>
    <text class="text" x="89" y="87">User</text>
    <line class="lifeline" x1="115" y1="105" x2="115" y2="700"/>
  </g>
  <g>
    <rect class="head" x="220" y="55" width="160" height="50"/>
    <text class="text" x="248" y="87">CLI / UI API</text>
    <line class="lifeline" x1="300" y1="105" x2="300" y2="700"/>
  </g>
  <g>
    <rect class="head" x="430" y="55" width="190" height="50"/>
    <text class="text" x="455" y="87">RunCoordinator</text>
    <line class="lifeline" x1="525" y1="105" x2="525" y2="700"/>
  </g>
  <g>
    <rect class="head" x="670" y="55" width="130" height="50"/>
    <text class="text" x="702" y="87">Planner</text>
    <line class="lifeline" x1="735" y1="105" x2="735" y2="700"/>
  </g>
  <g>
    <rect class="head" x="835" y="55" width="170" height="50"/>
    <text class="text" x="865" y="87">Route + Context</text>
    <line class="lifeline" x1="920" y1="105" x2="920" y2="700"/>
  </g>
  <g>
    <rect class="head" x="1040" y="55" width="180" height="50"/>
    <text class="text" x="1068" y="87">Approval / Exec / Validate</text>
    <line class="lifeline" x1="1130" y1="105" x2="1130" y2="700"/>
  </g>

  <path class="arrow" d="M 115 150 L 300 150"/>
  <text class="small" x="132" y="142">run goal / resume / inspect</text>

  <path class="arrow" d="M 300 200 L 525 200"/>
  <text class="small" x="336" y="192">startRun or resumeRun</text>

  <path class="arrow" d="M 525 250 L 735 250"/>
  <text class="small" x="562" y="242">createInitialPlan / replan</text>
  <path class="arrow" d="M 735 290 L 525 290"/>
  <text class="small" x="596" y="282">tasks and graph patch</text>

  <path class="arrow" d="M 525 340 L 920 340"/>
  <text class="small" x="618" y="332">agent selection + context assembly</text>

  <path class="arrow" d="M 525 400 L 1130 400"/>
  <text class="small" x="650" y="392">risk review, approval, execution, validation</text>
  <path class="arrow" d="M 1130 450 L 525 450"/>
  <text class="small" x="712" y="442">task events, outputs, validation result</text>

  <path class="arrow" d="M 525 520 L 1130 520"/>
  <text class="small" x="658" y="512">persist run, graph, events, artifacts, memory</text>

  <path class="arrow" d="M 525 600 L 300 600"/>
  <text class="small" x="360" y="592">inspection data / next run status</text>

  <path class="arrow" d="M 300 650 L 115 650"/>
  <text class="small" x="155" y="642">visible state and outputs</text>

  <rect class="note" x="410" y="685" width="460" height="46"/>
  <text class="small" x="444" y="714">The durable truth is the run state, not just transient agent output.</text>
</svg>
